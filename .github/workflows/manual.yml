name: Deploy

on:
    push:
        branches: [ main ]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to server via SSH
              uses: appleboy/ssh-action@v1.2.5
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: 9011
                  script: |
                      set -e

                      cd ~/projects/btclott.com/backend


                      echo ">>> Resetting local changes..."
                      git reset --hard
                      git clean -fd

                      echo ">>> Pulling latest code..."
                      git pull origin main --ff-only

                      echo ">>> Ensuring containers are up..."
                      docker compose up -d

                      
                      if git diff --name-only HEAD@{1} HEAD | grep -q '^composer.lock$'; then
                        echo ">>> composer.lock changed, running composer install..."
                        docker exec btclott_php \
                          composer install --no-interaction --prefer-dist --optimize-autoloader
                      else
                        echo ">>> composer.lock unchanged, skipping composer install."
                      fi

                      echo ">>> Running migrations..."
                      docker exec btclott_php \
                        bin/console doctrine:migrations:migrate --no-interaction

                      echo ">>> Deployment completed successfully."
